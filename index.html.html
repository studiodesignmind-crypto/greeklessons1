<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Μάθηση — Modern Greek Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --ink: #1a1612;
    --ink-light: #6b6355;
    --ink-faint: #c4bdb0;
    --accent: #c8410a;
    --accent-light: #f5e6df;
    --accent2: #1a6b5a;
    --accent2-light: #dff0eb;
    --gold: #c9a84c;
    --wrong: #c8410a;
    --wrong-light: #fdf0eb;
    --right: #1a6b5a;
    --right-light: #dff0eb;
    --border: #ddd8cc;
    --radius: 10px;
    --shadow: 0 2px 16px rgba(26,22,18,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(26,22,18,0.3);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    letter-spacing: 0.01em;
  }

  .logo span { color: var(--gold); }

  .progress-area {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.82rem;
    color: var(--ink-faint);
  }

  .progress-bar-outer {
    width: 140px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── DAY NAV ── */
  .day-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .day-nav::-webkit-scrollbar { display: none; }

  .day-nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    padding: 0 24px;
    gap: 0;
  }

  .day-tab {
    padding: 12px 18px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.02em;
  }

  .day-tab:hover { color: var(--ink); }
  .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .day-tab.completed { color: var(--right); }
  .day-tab.completed::after { content: ' ✓'; }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── DAY HEADER ── */
  .day-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .day-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .day-subtitle {
    color: var(--ink-light);
    font-size: 0.9rem;
  }

  .day-meta {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .day-meta-tag {
    font-size: 0.78rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--ink-light);
    font-weight: 500;
  }

  /* ── GRAMMAR BOX ── */
  .grammar-box {
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
  }

  .grammar-box h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .grammar-box p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: rgba(245,240,232,0.85);
  }

  .grammar-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 0.85rem;
  }

  .grammar-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--gold);
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
  }

  .grammar-table td {
    padding: 6px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    color: rgba(245,240,232,0.85);
  }

  .grammar-table td:first-child {
    font-family: 'DM Mono', monospace;
    color: rgba(245,240,232,0.5);
    font-size: 0.8rem;
  }

  .grammar-table td:last-child {
    color: var(--bg);
    font-weight: 500;
  }

  /* ── EXERCISE CARD ── */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: opacity 0.3s;
  }

  .exercise-card.locked {
    opacity: 0.45;
    pointer-events: none;
  }

  .exercise-header {
    padding: 16px 22px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .exercise-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .exercise-title {
    font-weight: 500;
    font-size: 0.95rem;
    color: var(--ink);
  }

  .grammar-tag {
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
  }

  .exercise-body {
    padding: 22px;
  }

  /* ── TEXT PASSAGE ── */
  .text-passage {
    background: var(--surface2);
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 20px;
    margin-bottom: 22px;
    font-size: 0.95rem;
    line-height: 1.9;
  }

  .text-passage .greek {
    font-size: 1.05rem;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .text-passage .translation {
    font-size: 0.82rem;
    color: var(--ink-light);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 10px;
  }

  /* ── QUESTION ── */
  .question {
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }

  .question:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .question-text {
    font-size: 0.95rem;
    margin-bottom: 12px;
    color: var(--ink);
    line-height: 1.6;
  }

  .question-text .greek-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink-light);
  }

  /* ── FILL IN BLANK ── */
  .blank-container {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 1rem;
    line-height: 2;
  }

  .blank-input {
    border: none;
    border-bottom: 2px solid var(--ink-faint);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    padding: 2px 6px;
    min-width: 120px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }

  .blank-input:focus { border-bottom-color: var(--accent); }
  .blank-input.correct { border-bottom-color: var(--right); color: var(--right); }
  .blank-input.incorrect { border-bottom-color: var(--wrong); color: var(--wrong); }

  /* ── MULTIPLE CHOICE ── */
  .mc-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .mc-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s;
    font-size: 0.9rem;
    background: var(--surface);
    user-select: none;
  }

  .mc-option:hover { border-color: var(--ink-light); background: var(--surface2); }
  .mc-option.selected { border-color: var(--accent); background: var(--accent-light); }
  .mc-option.correct { border-color: var(--right); background: var(--right-light); color: var(--right); }
  .mc-option.incorrect { border-color: var(--wrong); background: var(--wrong-light); color: var(--wrong); }
  .mc-option.show-correct { border-color: var(--right); background: var(--right-light); color: var(--right); }

  .mc-letter {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--ink-light);
    min-width: 18px;
  }

  .mc-option.correct .mc-letter,
  .mc-option.incorrect .mc-letter,
  .mc-option.show-correct .mc-letter { color: inherit; }

  /* ── FREE WRITE ── */
  .free-write-area {
    width: 100%;
    min-height: 90px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: var(--surface);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .free-write-area:focus { border-color: var(--accent); }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.86rem;
    line-height: 1.6;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--right-light); color: var(--right); }
  .feedback.incorrect-fb { background: var(--wrong-light); color: var(--wrong); }
  .feedback.neutral-fb { background: var(--surface2); color: var(--ink-light); }
  .feedback strong { font-weight: 600; }

  /* ── EXERCISE SUBMIT ── */
  .exercise-submit-area {
    margin-top: 24px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
  }

  .score-display {
    font-size: 0.85rem;
    color: var(--ink-light);
    display: none;
  }

  .score-display.show { display: block; }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #a83408; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  .btn-success {
    background: var(--right);
    color: white;
  }

  .btn-success:hover { background: #145a4c; }

  /* ── VOCAB SIDEBAR ── */
  .vocab-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 24px;
  }

  .vocab-box h4 {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .vocab-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }

  .vocab-item {
    font-size: 0.85rem;
  }

  .vocab-greek {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--ink);
  }

  .vocab-en {
    color: var(--ink-light);
    font-size: 0.8rem;
  }

  /* ── TIP BOX ── */
  .tip-box {
    background: #fff8e8;
    border: 1px solid #e8d5a0;
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 0.86rem;
    color: #7a6020;
    line-height: 1.6;
  }

  .tip-box::before {
    content: '💡 ';
  }

  /* ── DAY COMPLETE ── */
  .day-complete {
    text-align: center;
    padding: 48px 24px;
    display: none;
  }

  .day-complete.show { display: block; }

  .day-complete-icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .day-complete h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }

  .day-complete p {
    color: var(--ink-light);
    margin-bottom: 24px;
  }

  .day-score-big {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* ── ANSWER KEY ── */
  .answer-key {
    margin-top: 12px;
    padding: 14px 18px;
    background: var(--surface2);
    border-radius: var(--radius);
    font-size: 0.86rem;
    display: none;
  }

  .answer-key.show { display: block; }
  .answer-key h4 {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
  }

  .answer-item {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: flex-start;
  }

  .answer-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink-faint);
    min-width: 20px;
    padding-top: 2px;
  }

  .answer-text {
    color: var(--ink);
    line-height: 1.5;
  }

  .answer-text .correct-form {
    font-family: 'DM Mono', monospace;
    color: var(--right);
    font-weight: 500;
  }

  .answer-text .note {
    color: var(--ink-light);
    font-size: 0.82rem;
    display: block;
  }

  /* ── MATCHING ── */
  .match-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .match-col h5 {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .match-item {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.88rem;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface);
  }

  .match-item:hover { border-color: var(--ink-light); }
  .match-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .match-item.matched { border-color: var(--right); background: var(--right-light); color: var(--right); pointer-events: none; }
  .match-item.wrong-match { border-color: var(--wrong); background: var(--wrong-light); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .day-title { font-size: 1.5rem; }
    main { padding: 20px 16px 60px; }
    .header-inner { padding: 12px 16px; }
    .match-container { grid-template-columns: 1fr; }
    .vocab-list { grid-template-columns: 1fr 1fr; }
    .progress-area { display: none; }
  }

  /* ── DECORATIVE ── */
  .section-divider {
    text-align: center;
    margin: 32px 0;
    position: relative;
  }

  .section-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .section-divider span {
    position: relative;
    background: var(--bg);
    padding: 0 16px;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .inline-greek {
    font-family: 'DM Mono', monospace;
    font-size: 0.95em;
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">μάθηση <span>Greek</span></div>
    <div class="progress-area">
      <span id="progress-text">Day 1 · Exercise 1</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
  </div>
</header>

<nav class="day-nav">
  <div class="day-nav-inner" id="day-tabs"></div>
</nav>

<main id="main-content"></main>

<script>
// ═══════════════════════════════════════════════
// DATA — 7 DAYS OF CONTENT
// ═══════════════════════════════════════════════

const DAYS = [

// ─── DAY 1 ───────────────────────────────────
{
  day: 1,
  title: "Present Tense Review",
  subtitle: "Getting back into the groove — both verb groups",
  time: "~35 min",
  topics: ["Present tense -ω verbs", "Present tense -ώ/-άω verbs", "Basic workplace vocabulary"],
  exercises: [

    {
      id: "d1e1",
      type: "fill",
      label: "Exercise 1",
      title: "Present tense — -ω verbs",
      grammar: "Present: -ω verbs",
      grammar_note: `<p>These are the "standard" verbs. Pattern: <strong>γράφω, γράφεις, γράφει, γράφουμε, γράφετε, γράφουν</strong>. The stem stays the same, only the ending changes. You already know these well — this is just a warm-up.</p>`,
      questions: [
        {
          text: "I write the report. → _____ την αναφορά.",
          hint: "(γράφω)",
          answer: "γράφω",
          feedback_wrong: "The verb is γράφω — first person singular, so the ending is -ω. Full form: γράφω."
        },
        {
          text: "She reads the email. → Αυτή _____ το email.",
          hint: "(διαβάζω)",
          answer: "διαβάζει",
          feedback_wrong: "Third person singular of διαβάζω → διαβάζ + ει = διαβάζει."
        },
        {
          text: "We work in the office. → Εμείς _____ στο γραφείο.",
          hint: "(δουλεύω)",
          answer: "δουλεύουμε",
          feedback_wrong: "First person plural → δουλεύ + ουμε = δουλεύουμε."
        },
        {
          text: "Do you understand? → _____; ",
          hint: "(καταλαβαίνω — you, informal)",
          answer: "καταλαβαίνεις",
          feedback_wrong: "Second person singular → καταλαβαίν + εις = καταλαβαίνεις."
        },
        {
          text: "They send the documents. → Αυτοί _____ τα έγγραφα.",
          hint: "(στέλνω)",
          answer: "στέλνουν",
          feedback_wrong: "Third person plural → στέλν + ουν = στέλνουν."
        }
      ],
      answers: [
        { correct: ["γράφω"] },
        { correct: ["διαβάζει"] },
        { correct: ["δουλεύουμε"] },
        { correct: ["καταλαβαίνεις"] },
        { correct: ["στέλνουν"] }
      ]
    },

    {
      id: "d1e2",
      type: "fill",
      label: "Exercise 2",
      title: "Present tense — -ώ/-άω verbs",
      grammar: "Present: -ώ verbs",
      grammar_note: `<p>These verbs look similar but follow a <strong>different pattern</strong>. Key difference: the endings have an <strong>α</strong> in them.<br><br>
      Example — <strong>μιλώ</strong> (to speak):<br>
      μιλώ / μιλάς / μιλάει / μιλάμε / μιλάτε / μιλάνε<br><br>
      Common -ώ verbs you'll use constantly: <strong>ρωτώ</strong> (ask), <strong>βοηθώ</strong> (help), <strong>περνώ</strong> (spend time/get on), <strong>αγαπώ</strong> (love), <strong>πηγαίνω</strong>... wait, that one's a -ω verb. Stay alert!</p>`,
      questions: [
        {
          text: "My colleague asks the manager. → Ο συνάδελφός μου _____ τον διευθυντή.",
          hint: "(ρωτώ)",
          answer: "ρωτάει",
          feedback_wrong: "ρωτώ → third person singular = ρωτάει. Notice the -ά- that appears in the middle."
        },
        {
          text: "We help the new employee. → Εμείς _____ τον νέο υπάλληλο.",
          hint: "(βοηθώ)",
          answer: "βοηθάμε",
          feedback_wrong: "βοηθώ → first person plural = βοηθάμε."
        },
        {

// STATE
// ═══════════════════════════════════════════════

let currentDay = 0;
let exerciseStates = {}; // { exId: { submitted: bool, score: int, total: int } }
let matchState = {}; // for matching exercises

// ═══════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════

function renderDayTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = DAYS.map((d, i) => `
    <button class="day-tab ${i === currentDay ? 'active' : ''} ${isDayComplete(i) ? 'completed' : ''}"
      onclick="switchDay(${i})">Day ${d.day}</button>
  `).join('');
}

function isDayComplete(dayIdx) {
  const day = DAYS[dayIdx];
  return day.exercises.every(ex => exerciseStates[ex.id]?.submitted);
}

function switchDay(idx) {
  currentDay = idx;
  renderAll();
}

function renderAll() {
  renderDayTabs();
  renderDay();
  updateProgress();
}

function updateProgress() {
  const total = DAYS.reduce((a, d) => a + d.exercises.length, 0);
  const done = Object.values(exerciseStates).filter(s => s.submitted).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done}/${total} exercises`;
}

function renderDay() {
  const day = DAYS[currentDay];
  const main = document.getElementById('main-content');

  // Check previous day completion gate (allow Day 1 always)
  const prevComplete = currentDay === 0 || isDayComplete(currentDay - 1);

  let html = `
    <div class="day-header">
      <div class="day-label">Day ${day.day} of 7</div>
      <h1 class="day-title">${day.title}</h1>
      <p class="day-subtitle">${day.subtitle}</p>
      <div class="day-meta">
        <span class="day-meta-tag">⏱ ${day.time}</span>
        ${day.topics.map(t => `<span class="day-meta-tag">${t}</span>`).join('')}
      </div>
    </div>
  `;

  if (!prevComplete && currentDay > 0) {
    html += `<div style="text-align:center;padding:40px;color:var(--ink-light)">
      <p style="font-size:1.1rem;margin-bottom:8px">Complete Day ${currentDay} first to unlock this day.</p>
      <button class="btn btn-secondary" onclick="switchDay(${currentDay-1})">← Go back to Day ${currentDay}</button>
    </div>`;
    main.innerHTML = html;
    return;
  }

  day.exercises.forEach((ex, exIdx) => {
    const prevSubmitted = exIdx === 0 || exerciseStates[day.exercises[exIdx-1].id]?.submitted;
    const locked = !prevSubmitted;
    const state = exerciseStates[ex.id];

    html += `<div class="exercise-card ${locked ? 'locked' : ''}" id="card-${ex.id}">`;
    html += `<div class="exercise-header">
      <div>
        <div class="exercise-label">${ex.label}</div>
        <div class="exercise-title">${ex.title}</div>
      </div>
      <span class="grammar-tag">${ex.grammar}</span>
    </div>`;
    html += `<div class="exercise-body">`;

    // Grammar note
    if (ex.grammar_note) {
      html += `<div class="grammar-box"><h3>Quick Grammar Note</h3>${ex.grammar_note}</div>`;
    }

    // Exercise type rendering
    if (ex.type === 'fill') html += renderFill(ex, state);
    else if (ex.type === 'mc') html += renderMC(ex, state);
    else if (ex.type === 'text_read') html += renderTextRead(ex, state);
    else if (ex.type === 'free_write') html += renderFreeWrite(ex, state);

    html += `</div></div>`;
  });

  main.innerHTML = html;

  // Restore submitted states visually
  day.exercises.forEach(ex => {
    if (exerciseStates[ex.id]?.submitted) {
      restoreExerciseState(ex);
    }
  });
}

// ─── FILL IN BLANK ───────────────────────────

function renderFill(ex, state) {
  let html = '';
  ex.questions.forEach((q, i) => {
    html += `<div class="question">
      <div class="question-text">${q.text} <span class="greek-hint">${q.hint || ''}</span></div>
      <input type="text" class="blank-input" id="fill-${ex.id}-${i}"
        placeholder="type here..."
        ${state?.submitted ? 'disabled' : ''}
        onkeydown="if(event.key==='Enter')submitFill('${ex.id}')">
      <div class="feedback" id="fb-fill-${ex.id}-${i}"></div>
    </div>`;
  });

  html += `<div class="exercise-submit-area">
    <span class="score-display" id="score-${ex.id}"></span>
    ${!state?.submitted ? `<button class="btn btn-primary" onclick="submitFill('${ex.id}')">Check answers →</button>` : `<button class="btn btn-success" disabled>✓ Completed</button>`}
  </div>`;

  html += renderAnswerKey(ex, state);
  return html;
}

function submitFill(exId) {
  const day = DAYS[currentDay];
  const ex = day.exercises.find(e => e.id === exId);
  let correct = 0;

  ex.questions.forEach((q, i) => {
    const input = document.getElementById(`fill-${exId}-${i}`);
    const fb = document.getElementById(`fb-fill-${exId}-${i}`);
    const userVal = input.value.trim().toLowerCase().replace(/[άαΑ]/g, 'α').replace(/[έεΕ]/g,'ε').replace(/[ήιΗΙ]/g,'ι').replace(/[όοΟ]/g,'ο').replace(/[ύυΥ]/g,'υ').replace(/[ώωΩ]/g,'ω');
    
    const correctAnswers = ex.answers[i].correct.map(a => a.toLowerCase().replace(/[άαΑ]/g, 'α').replace(/[έεΕ]/g,'ε').replace(/[ήιΗΙ]/g,'ι').replace(/[όοΟ]/g,'ο').replace(/[ύυΥ]/g,'υ').replace(/[ώωΩ]/g,'ω'));
    
    const isCorrect = correctAnswers.includes(userVal);

    input.classList.add(isCorrect ? 'correct' : 'incorrect');
    input.disabled = true;

    if (isCorrect) {
      correct++;
      fb.className = 'feedback correct-fb show';
      fb.innerHTML = '✓ Correct!';
    } else {
      fb.className = 'feedback incorrect-fb show';
      fb.innerHTML = `✗ ${q.feedback_wrong || 'Correct answer: ' + ex.answers[i].correct[0]}`;
    }
  });

  exerciseStates[exId] = { submitted: true, score: correct, total: ex.questions.length };
  showScore(exId, correct, ex.questions.length);
  showAnswerKey(exId, ex);
  unlockNext(exId);
  updateProgress();
  renderDayTabs();
}

// ─── MULTIPLE CHOICE ─────────────────────────

function renderMC(ex, state) {
  let html = '';
  ex.questions.forEach((q, i) => {
    html += `<div class="question">
      <div class="question-text">${q.text}</div>
      <div class="mc-options" id="mc-${ex.id}-${i}">`;
    q.options.forEach((opt, j) => {
      html += `<div class="mc-option" id="mc-opt-${ex.id}-${i}-${j}" onclick="selectMC('${ex.id}',${i},${j},${q.correct})">
        <span class="mc-letter">${String.fromCharCode(65+j)}.</span>
        <span>${opt}</span>
      </div>`;
    });
    html += `</div>
      <div class="feedback" id="fb-mc-${ex.id}-${i}"></div>
    </div>`;
  });

  if (!state?.submitted) {
    html += `<div class="exercise-submit-area">
      <span class="score-display" id="score-${ex.id}"></span>
      <button class="btn btn-primary" onclick="submitMC('${ex.id}')">Check answers →</button>
    </div>`;
  } else {
    html += `<div class="exercise-submit-area">
      <span class="score-display show" id="score-${ex.id}"></span>
      <button class="btn btn-success" disabled>✓ Completed</button>
    </div>`;
  }
  return html;
}

let mcSelections = {};

function selectMC(exId, qIdx, optIdx, correct) {
  if (exerciseStates[exId]?.submitted) return;
  if (!mcSelections[exId]) mcSelections[exId] = {};
  mcSelections[exId][qIdx] = optIdx;

  const ex = DAYS[currentDay].exercises.find(e => e.id === exId);
  const numOpts = ex.questions[qIdx].options.length;
  for (let j = 0; j < numOpts; j++) {
    const el = document.getElementById(`mc-opt-${exId}-${qIdx}-${j}`);
    el.classList.remove('selected');
  }
  document.getElementById(`mc-opt-${exId}-${qIdx}-${optIdx}`).classList.add('selected');
}

function submitMC(exId) {
  const day = DAYS[currentDay];
  const ex = day.exercises.find(e => e.id === exId);
  let correct = 0;
  const sels = mcSelections[exId] || {};

  ex.questions.forEach((q, i) => {
    const selected = sels[i];
    const fb = document.getElementById(`fb-mc-${exId}-${i}`);
    
    q.options.forEach((_, j) => {
      const el = document.getElementById(`mc-opt-${exId}-${i}-${j}`);
      el.style.pointerEvents = 'none';
      el.classList.remove('selected');
      if (j === q.correct) el.classList.add('show-correct');
    });

    if (selected === undefined) {
      fb.className = 'feedback incorrect-fb show';
      fb.innerHTML = '✗ No answer selected. ' + (q.feedback_wrong || '');
    } else if (selected === q.correct) {
      correct++;
      document.getElementById(`mc-opt-${exId}-${i}-${selected}`).classList.remove('show-correct');
      document.getElementById(`mc-opt-${exId}-${i}-${selected}`).classList.add('correct');
      fb.className = 'feedback correct-fb show';
      fb.innerHTML = '✓ Correct!';
    } else {
      document.getElementById(`mc-opt-${exId}-${i}-${selected}`).classList.add('incorrect');
      fb.className = 'feedback incorrect-fb show';
      fb.innerHTML = '✗ ' + (q.feedback_wrong || '');
    }
  });

  exerciseStates[exId] = { submitted: true, score: correct, total: ex.questions.length };
  showScore(exId, correct, ex.questions.length);
  unlockNext(exId);
  updateProgress();
  renderDayTabs();
}

// ─── TEXT READ ────────────────────────────────

function renderTextRead(ex, state) {
  let html = `<div class="text-passage">
    <div class="greek">${ex.passage.greek.replace(/\n/g, '<br>')}</div>
    <div class="translation">${ex.passage.translation.replace(/\n/g, '<br>')}</div>
  </div>`;

  let mcCount = 0, freeCount = 0;
  ex.questions.forEach((q, i) => {
    html += `<div class="question"><div class="question-text"><strong>Q${i+1}.</strong> ${q.text}</div>`;
    if (q.type === 'mc') {
      html += `<div class="mc-options" id="mc-${ex.id}-tr${i}">`;
      q.options.forEach((opt, j) => {
        html += `<div class="mc-option" id="mc-opt-${ex.id}-tr${i}-${j}" onclick="selectMC_TR('${ex.id}',${i},${j},${q.correct})">
          <span class="mc-letter">${String.fromCharCode(65+j)}.</span><span>${opt}</span>
        </div>`;
      });
      html += `</div><div class="feedback" id="fb-tr-${ex.id}-${i}"></div>`;
      mcCount++;
    } else {
      html += `<textarea class="free-write-area" id="free-tr-${ex.id}-${i}" placeholder="Write your answer here..." rows="3" ${state?.submitted ? 'disabled' : ''}></textarea>
        <div class="feedback neutral-fb show" id="fb-tr-${ex.id}-${i}" style="margin-top:8px;display:${state?.submitted?'block':'none'}">
          <strong>Model answer:</strong> ${q.model_answer}
        </div>`;
      freeCount++;
    }
    html += `</div>`;
  });

  html += `<div class="exercise-submit-area">
    <span class="score-display" id="score-${ex.id}"></span>
    ${!state?.submitted ? `<button class="btn btn-primary" onclick="submitTextRead('${ex.id}')">Check answers →</button>` : `<button class="btn btn-success" disabled>✓ Completed</button>`}
  </div>`;
  return html;
}

let trSelections = {};

function selectMC_TR(exId, qIdx, optIdx, correct) {
  if (exerciseStates[exId]?.submitted) return;
  if (!trSelections[exId]) trSelections[exId] = {};
  trSelections[exId][qIdx] = optIdx;

  const ex = DAYS[currentDay].exercises.find(e => e.id === exId);
  const numOpts = ex.questions[qIdx].options.length;
  for (let j = 0; j < numOpts; j++) {
    const el = document.getElementById(`mc-opt-${exId}-tr${qIdx}-${j}`);
    if(el) el.classList.remove('selected');
  }
  const sel = document.getElementById(`mc-opt-${exId}-tr${qIdx}-${optIdx}`);
  if(sel) sel.classList.add('selected');
}

function submitTextRead(exId) {
  const day = DAYS[currentDay];
  const ex = day.exercises.find(e => e.id === exId);
  let correct = 0, mcTotal = 0;
  const sels = trSelections[exId] || {};

  ex.questions.forEach((q, i) => {
    const fb = document.getElementById(`fb-tr-${ex.id}-${i}`);
    if (q.type === 'mc') {
      mcTotal++;
      const selected = sels[i];
      q.options.forEach((_, j) => {
        const el = document.getElementById(`mc-opt-${exId}-tr${i}-${j}`);
        if(el) { el.style.pointerEvents = 'none'; el.classList.remove('selected'); }
        if(j === q.correct && el) el.classList.add('show-correct');
      });
      if (selected === undefined) {
        if(fb) { fb.className = 'feedback incorrect-fb show'; fb.innerHTML = '✗ No answer. ' + (q.feedback_wrong||''); }
      } else if (selected === q.correct) {
        correct++;
        const selEl = document.getElementById(`mc-opt-${exId}-tr${i}-${selected}`);
        if(selEl) { selEl.classList.remove('show-correct'); selEl.classList.add('correct'); }
        if(fb) { fb.className = 'feedback correct-fb show'; fb.innerHTML = '✓ Correct!'; }
      } else {
        const selEl = document.getElementById(`mc-opt-${exId}-tr${i}-${selected}`);
        if(selEl) selEl.classList.add('incorrect');
        if(fb) { fb.className = 'feedback incorrect-fb show'; fb.innerHTML = '✗ ' + (q.feedback_wrong||''); }
      }
    } else {
      // free: show model answer
      const ta = document.getElementById(`free-tr-${exId}-${i}`);
      if(ta) ta.disabled = true;
      if(fb) { fb.style.display = 'block'; }
    }
  });

  exerciseStates[exId] = { submitted: true, score: correct, total: mcTotal };
  showScore(exId, correct, mcTotal);
  unlockNext(exId);
  updateProgress();
  renderDayTabs();
}

// ─── FREE WRITE ───────────────────────────────

function renderFreeWrite(ex, state) {
  let html = `<div class="tip-box">Write freely — don't aim for perfection. After submitting, you'll see a model answer to compare with yours.</div>`;
  html += `<div class="question-text" style="margin-bottom:12px">${ex.prompt.replace(/\n/g, '<br>')}</div>`;
  html += `<textarea class="free-write-area" id="fw-${ex.id}" rows="7" placeholder="Write your Greek here..." ${state?.submitted ? 'disabled' : ''}></textarea>`;
  
  if (state?.submitted) {
    html += `<div class="feedback neutral-fb show" style="margin-top:12px"><strong>Model answer:</strong><br><br>${ex.model_answer.replace(/\n/g, '<br>')}</div>`;
    html += `<div class="exercise-submit-area"><button class="btn btn-success" disabled>✓ Completed</button></div>`;
  } else {
    html += `<div class="exercise-submit-area">
      <button class="btn btn-secondary" onclick="submitFreeWrite('${ex.id}')">Submit & see model answer →</button>
    </div>`;
  }
  return html;
}

function submitFreeWrite(exId) {
  exerciseStates[exId] = { submitted: true, score: 1, total: 1 };
  unlockNext(exId);
  updateProgress();
  renderAll();
}

// ─── HELPERS ──────────────────────────────────

function showScore(exId, correct, total) {
  const el = document.getElementById(`score-${exId}`);
  if (!el) return;
  el.classList.add('show');
  const pct = Math.round((correct/total)*100);
  const emoji = pct === 100 ? '🌟' : pct >= 70 ? '👍' : '💪';
  el.textContent = `${emoji} ${correct}/${total} correct`;
}

function showAnswerKey(exId, ex) {
  const key = document.getElementById(`answer-key-${exId}`);
  if (key) key.classList.add('show');
}

function renderAnswerKey(ex, state) {
  if (!state?.submitted) {
    return `<div class="answer-key" id="answer-key-${ex.id}">
      <h4>Answer Key</h4>
      ${ex.questions.map((q, i) => `<div class="answer-item">
        <span class="answer-num">${i+1}.</span>
        <div class="answer-text"><span class="correct-form">${ex.answers[i].correct[0]}</span>
        ${q.feedback_wrong ? `<span class="note">${q.feedback_wrong}</span>` : ''}
        </div>
      </div>`).join('')}
    </div>`;
  }
  return `<div class="answer-key show">
    <h4>Answer Key</h4>
    ${ex.questions.map((q, i) => `<div class="answer-item">
      <span class="answer-num">${i+1}.</span>
      <div class="answer-text"><span class="correct-form">${ex.answers[i].correct[0]}</span>
      ${q.feedback_wrong ? `<span class="note">${q.feedback_wrong}</span>` : ''}
      </div>
    </div>`).join('')}
  </div>`;
}

function unlockNext(exId) {
  const day = DAYS[currentDay];
  const idx = day.exercises.findIndex(e => e.id === exId);
  if (idx < day.exercises.length - 1) {
    const nextCard = document.getElementById(`card-${day.exercises[idx+1].id}`);
    if (nextCard) {
      nextCard.classList.remove('locked');
      setTimeout(() => nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
    }
  }
}

  // Just re-render handles it via state checks
}
