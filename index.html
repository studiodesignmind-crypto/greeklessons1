<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ελληνικά — Greek for the Real World</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --surface3: #2e2c29;
    --border: #3a3835;
    --text: #f0ebe2;
    --text-muted: #8a8580;
    --text-dim: #5a5750;
    --accent: #e8c547;
    --accent2: #4a9eff;
    --accent3: #ff6b4a;
    --success: #5dba7e;
    --error: #e85d4a;
    --greek-blue: #4a9eff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.6s ease;
  }

  #splash.hidden { opacity: 0; pointer-events: none; }

  .splash-greek {
    font-family: 'Playfair Display', serif;
    font-size: clamp(72px, 12vw, 140px);
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
  }

  .splash-sub {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 16px;
    animation: fadeUp 0.8s 0.2s ease forwards;
    opacity: 0;
  }

  .splash-btn {
    margin-top: 48px;
    padding: 16px 48px;
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    animation: fadeUp 0.8s 0.4s ease forwards;
    opacity: 0;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .splash-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(232,197,71,0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── MAIN LAYOUT ── */
  #app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 32px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .logo {
    padding: 0 24px 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo-greek {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .sidebar-section {
    padding: 24px 16px 8px;
  }

  .sidebar-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .day-btn {
    width: 100%;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    text-align: left;
  }

  .day-btn:hover { background: var(--surface2); color: var(--text); }
  .day-btn.active { background: var(--surface3); color: var(--accent); }

  .day-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .day-btn.active .day-num { background: var(--accent); color: #0f0e0c; }

  .day-complete { color: var(--success) !important; }

  .progress-bar-wrap {
    margin: auto 24px 24px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ── MAIN CONTENT ── */
  #main {
    padding: 48px;
    max-width: 860px;
  }

  .day-header {
    margin-bottom: 40px;
  }

  .day-tag {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.15;
    color: var(--text);
  }

  .day-title em {
    color: var(--accent);
    font-style: italic;
  }

  .day-meta {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
  }

  .day-meta span { display: flex; align-items: center; gap: 6px; }

  /* ── THEORY BOX ── */
  .theory-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 32px;
  }

  .theory-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .theory-box p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .theory-box p + p { margin-top: 10px; }

  .conj-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-size: 13px;
  }

  .conj-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  .conj-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--surface3);
    color: var(--text);
  }

  .conj-table td:last-child {
    font-family: 'DM Mono', monospace;
    color: var(--greek-blue);
  }

  /* ── EXERCISE CARD ── */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .exercise-card.completed { border-color: var(--success); }

  .ex-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .ex-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .ex-type {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--surface3);
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .ex-body { padding: 24px; }

  .ex-intro {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  /* ── TEXT PASSAGE ── */
  .passage {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    margin-bottom: 20px;
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
  }

  .passage .greek { color: var(--greek-blue); }
  .passage .translation {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── QUESTIONS ── */
  .question {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--surface3);
  }

  .question:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .q-num {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .q-text {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .q-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-style: italic;
  }

  /* ── FILL IN THE BLANK ── */
  .blank-sentence {
    font-size: 16px;
    color: var(--text);
    line-height: 2;
    margin-bottom: 10px;
  }

  .blank-input {
    display: inline-block;
    min-width: 140px;
    padding: 4px 12px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    vertical-align: middle;
  }

  .blank-input:focus { border-color: var(--accent2); }
  .blank-input.correct { border-color: var(--success); background: rgba(93,186,126,0.1); }
  .blank-input.incorrect { border-color: var(--error); background: rgba(232,93,74,0.1); }

  /* ── TEXT INPUT ── */
  .text-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .text-input:focus { border-color: var(--accent2); }

  /* ── MULTIPLE CHOICE ── */
  .mc-options { display: flex; flex-direction: column; gap: 8px; }

  .mc-option {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'DM Mono', monospace;
  }

  .mc-option:hover:not(.selected):not(.disabled) {
    border-color: var(--accent2);
    background: rgba(74,158,255,0.06);
  }

  .mc-option.selected { border-color: var(--accent2); background: rgba(74,158,255,0.1); }
  .mc-option.correct { border-color: var(--success) !important; background: rgba(93,186,126,0.12) !important; }
  .mc-option.incorrect { border-color: var(--error) !important; background: rgba(232,93,74,0.1) !important; }
  .mc-option.disabled { cursor: default; pointer-events: none; }

  .mc-letter {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── TEXTAREA / FREE WRITE ── */
  .freewrite-area {
    width: 100%;
    min-height: 120px;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
    line-height: 1.7;
  }

  .freewrite-area:focus { border-color: var(--accent2); }

  /* ── FEEDBACK BOX ── */
  .feedback {
    margin-top: 16px;
    padding: 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.7;
    display: none;
  }

  .feedback.visible { display: block; }
  .feedback.success { background: rgba(93,186,126,0.1); border: 1px solid var(--success); color: var(--success); }
  .feedback.error { background: rgba(232,93,74,0.08); border: 1px solid var(--error); color: #f09088; }
  .feedback.info { background: rgba(74,158,255,0.08); border: 1px solid var(--accent2); color: #88c0ff; }
  .feedback.partial { background: rgba(232,197,71,0.08); border: 1px solid var(--accent); color: var(--accent); }

  /* ── BUTTONS ── */
  .btn {
    padding: 10px 24px;
    border-radius: 100px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0e0c;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,197,71,0.25); }

  .btn-secondary {
    background: var(--surface3);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--surface2); border-color: var(--text-muted); }

  .btn-ghost {
    background: transparent;
    color: var(--accent2);
    padding: 8px 16px;
  }

  .btn-ghost:hover { background: rgba(74,158,255,0.08); }

  .ex-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--surface3);
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* ── SCORE SUMMARY ── */
  .score-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    margin-top: 32px;
    display: none;
  }

  .score-summary.visible { display: block; }

  .score-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--surface3) 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }

  .score-inner {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--accent);
    line-height: 1;
  }

  .score-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

  .score-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .score-msg { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  .day-nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
  }

  /* ── VOCAB CHIP ── */
  .vocab-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .vocab-chip {
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .vocab-chip strong {
    color: var(--greek-blue);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; }
    #sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; padding: 16px; }
    #main { padding: 24px 20px; }
    .logo { padding: 0 0 16px; border: none; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  .check-icon { display: none; }
  .exercise-card.completed .check-icon { display: inline; }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    background: rgba(232,197,71,0.1);
    border: 1px solid rgba(232,197,71,0.3);
    border-radius: 100px;
    font-size: 11px;
    color: var(--accent);
    margin-left: 16px;
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-greek">Ελληνικά</div>
  <div class="splash-sub">Greek for the Real World — 7-Day Programme</div>
  <button class="splash-btn" onclick="startApp()">Πάμε — Let's go</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-greek">Ελ.</div>
      <div class="logo-sub">7-Day Programme</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Review</div>
      <button class="day-btn active" onclick="showDay(0)" id="daybtn-0">
        <span class="day-num">1</span>
        <span>Present Tense</span>
      </button>
      <button class="day-btn" onclick="showDay(1)" id="daybtn-1">
        <span class="day-num">2</span>
        <span>Perfect Tense</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">New Ground</div>
      <button class="day-btn" onclick="showDay(2)" id="daybtn-2">
        <span class="day-num">3</span>
        <span>Simple Past (Aorist)</span>
      </button>
      <button class="day-btn" onclick="showDay(3)" id="daybtn-3">
        <span class="day-num">4</span>
        <span>θα Future</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Putting It Together</div>
      <button class="day-btn" onclick="showDay(4)" id="daybtn-4">
        <span class="day-num">5</span>
        <span>Mixed Tenses I</span>
      </button>
      <button class="day-btn" onclick="showDay(5)" id="daybtn-5">
        <span class="day-num">6</span>
        <span>Workplace Scenarios</span>
      </button>
      <button class="day-btn" onclick="showDay(6)" id="daybtn-6">
        <span class="day-num">7</span>
        <span>Real-Life Marathon</span>
      </button>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>Weekly Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <button onclick="resetProgress()" style="margin-top:14px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;" onmouseover="this.style.borderColor='var(--error)';this.style.color='var(--error)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-dim)'">↺ Reset Progress</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main"></main>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA — 7 DAYS OF EXERCISES
// ═══════════════════════════════════════════════════════════

const DAYS = [

// ─── DAY 1: Present Tense Review ───────────────────────────────────────────
{
  day: 1,
  tag: "Day 1 — Review",
  title: "Back to Basics: <em>The Present Tense</em>",
  subtitle: "Both -ω and -ώ verbs",
  time: "30–40 min",
  exercises: [
    {
      id: "d1e1",
      label: "Exercise 1",
      type: "Theory + Conjugation",
      grammar: "Present tense: -ω verbs",
      theory: `<p>You already know these. The regular <strong>-ω verbs</strong> are the backbone of Greek. Quick reminder of the pattern — you'll need this as a reference for everything that follows.</p>`,
      table: {
        headers: ["Person", "γράφω (to write)", "δουλεύω (to work)", "στέλνω (to send)"],
        rows: [
          ["εγώ (I)", "γράφω", "δουλεύω", "στέλνω"],
          ["εσύ (you)", "γράφεις", "δουλεύεις", "στέλνεις"],
          ["αυτός/η (he/she)", "γράφει", "δουλεύει", "στέλνει"],

const STORAGE_KEY = 'greekweek_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    return s;
  } catch(e) { return null; }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      currentDay,
      scores,
      completedExercises: [...completedExercises],
      lastSaved: new Date().toISOString()
    }));
  } catch(e) {}
}

const saved = loadState();
let currentDay = saved ? saved.currentDay : 0;
let scores = saved ? saved.scores : {};
let completedExercises = new Set(saved ? saved.completedExercises : []);
let selectedMC = {};

  document.getElementById('app').style.display = 'grid';
  renderDay(currentDay);
  document.querySelectorAll('.day-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentDay);
  });
  DAYS.forEach((day, idx) => {
    const exercisable = day.exercises.filter(e => e.blanks || e.mcqs || e.standaloneQ || e.freewrite);
    const allDone = exercisable.length > 0 && exercisable.every(e => completedExercises.has(e.id));
    if (allDone) {
      const btn = document.getElementById(`daybtn-${idx}`);
      if (btn) btn.querySelector('.day-num').style.background = 'var(--success)';
    }
  });
  updateProgress();
}

function showDay(idx) {
  currentDay = idx;
  saveState();
  document.querySelectorAll('.day-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  renderDay(idx);
  document.getElementById('main').scrollTo(0, 0);
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════
// RENDER DAY
// ═══════════════════════════════════════════════════════════

function renderDay(idx) {
  const day = DAYS[idx];
  const main = document.getElementById('main');

  let html = `
    <div class="day-header">
      <div class="day-tag">${day.tag}</div>
      <h1 class="day-title">${day.title}</h1>
      <div class="day-meta">
        <span>📚 ${day.subtitle}</span>
        <span>⏱ ${day.time}</span>
      </div>
    </div>
  `;

  day.exercises.forEach((ex, ei) => {
    html += renderExercise(ex, idx, ei);
  });

  html += renderDayNav(idx);
  main.innerHTML = html;
  restoreState(idx);
}

// ═══════════════════════════════════════════════════════════
// RENDER EXERCISE
// ═══════════════════════════════════════════════════════════

function renderExercise(ex, dayIdx, exIdx) {
  let inner = '';

  // Theory box
  if (ex.theory) {
    inner += `<div class="theory-box">
      <div class="theory-title">📖 Quick Theory — ${ex.grammar}</div>
      ${ex.theory}`;
    if (ex.table) {
      inner += renderTable(ex.table);
    }
    inner += `</div>`;
  }

  // If theory-only, no questions section needed
  if (ex.questions && ex.questions.length === 0 && !ex.blanks && !ex.mcqs && !ex.standaloneQ && !ex.freewrite) {
    return `<div class="exercise-card" id="card-${ex.id}">
      <div class="ex-header">
        <div class="ex-label">${ex.label} <span class="check-icon">✓</span></div>
        <div class="ex-type">${ex.type}</div>
      </div>
      <div class="ex-body">${inner}</div>
    </div>`;
  }

  // Intro text
  if (ex.intro) {
    inner += `<div class="ex-intro">ℹ️ ${ex.intro}</div>`;
  }

  // Passage
  if (ex.passage) {
    inner += `<div class="passage">
      <div class="greek">${ex.passage.greek.replace(/\n/g, '<br>')}</div>
      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-size:12px;color:var(--text-dim);letter-spacing:1px">▸ SHOW TRANSLATION</summary>
        <div style="margin-top:8px;font-size:13px;color:var(--text-muted);line-height:1.7">${ex.passage.translation.replace(/\n/g, '<br>')}</div>
      </details>
    </div>`;
  }

  // Fill in the blanks
  if (ex.blanks) {
    ex.blanks.forEach((b, bi) => {
      const inputId = `blank-${ex.id}-${bi}`;
      const parts = b.sentence.split('_____');
      inner += `<div class="question">
        <div class="q-num">Q${bi + 1}</div>
        <div class="blank-sentence">
          ${parts[0]}<input class="blank-input" id="${inputId}" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="...">${parts[1] || ''}
        </div>
        <div class="q-hint">Verb: ${b.verb}</div>
        <div class="feedback" id="fb-${inputId}"></div>
      </div>`;
    });

    if (ex.vocab) {
      inner += `<div class="vocab-row">` + ex.vocab.map(v => {
        const [greek, eng] = v.split(' = ');
        return `<div class="vocab-chip"><strong>${greek}</strong> = ${eng}</div>`;
      }).join('') + `</div>`;
    }

    inner += `<div class="ex-footer">
      <button class="btn btn-primary" onclick="checkBlanks('${ex.id}', ${dayIdx}, ${exIdx})">Check Answers</button>
      <button class="btn btn-ghost" onclick="revealBlanks('${ex.id}', ${dayIdx}, ${exIdx})">Reveal All</button>
    </div>`;
  }

  // MCQs (after passage)
  if (ex.mcqs) {
    ex.mcqs.forEach((q, qi) => {
      inner += renderMCQ(q, `${ex.id}-mcq-${qi}`, qi);
    });
    inner += `<div class="ex-footer">
      <button class="btn btn-primary" onclick="checkMCQs('${ex.id}', ${dayIdx}, ${exIdx})">Check Answers</button>
    </div>`;
  }

  // Standalone MCQs
  if (ex.standaloneQ) {
    ex.standaloneQ.forEach((q, qi) => {
      inner += renderMCQ(q, `${ex.id}-sq-${qi}`, qi);
    });
    inner += `<div class="ex-footer">
      <button class="btn btn-primary" onclick="checkStandaloneQ('${ex.id}', ${dayIdx}, ${exIdx})">Check Answers</button>
    </div>`;
  }

  // Free write
  if (ex.freewrite) {
    inner += `<textarea class="freewrite-area" id="fw-${ex.id}" placeholder="Write your answer here in Greek..."></textarea>
    <div class="ex-footer">
      <button class="btn btn-primary" onclick="revealModelAnswer('${ex.id}')">Show Model Answer</button>
    </div>
    <div class="feedback info" id="model-${ex.id}" style="margin:12px 24px">
      <strong>Model Answer:</strong><br>${ex.modelAnswer}
    </div>`;
  }

  return `<div class="exercise-card" id="card-${ex.id}">
    <div class="ex-header">
      <div class="ex-label">${ex.label} — <em style="font-size:11px;color:var(--text-dim)">${ex.grammar}</em> <span class="check-icon" style="color:var(--success)">✓</span></div>
      <div class="ex-type">${ex.type}</div>
    </div>
    <div class="ex-body">${inner}</div>
  </div>`;
}

function renderMCQ(q, key, qi) {
  const letters = ['a', 'b', 'c', 'd'];
  let html = `<div class="question" id="mcqwrap-${key}">
    <div class="q-num">Q${qi + 1}</div>
    <div class="q-text">${q.question}</div>
    <div class="mc-options">`;
  q.options.forEach((opt, oi) => {
    html += `<div class="mc-option" id="mc-${key}-${oi}" onclick="selectMC('${key}', ${oi}, ${q.options.length})">
      <span class="mc-letter">${letters[oi]}</span>${opt}
    </div>`;
  });
  html += `</div>
    <div class="feedback" id="fb-mcq-${key}"></div>
  </div>`;
  return html;
}

function renderTable(table) {
  let html = `<table class="conj-table"><thead><tr>`;
  table.headers.forEach(h => html += `<th>${h}</th>`);
  html += `</tr></thead><tbody>`;
  table.rows.forEach(row => {
    html += `<tr>`;
    row.forEach((cell, i) => html += `<td>${cell}</td>`);
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function renderDayNav(idx) {
  let html = `<div class="score-summary" id="day-summary-${idx}">
    <div class="score-circle" id="score-circle-${idx}">
      <div class="score-inner">
        <div class="score-num" id="score-num-${idx}">-</div>
        <div class="score-label">Score</div>
      </div>
    </div>
    <div class="score-title" id="score-title-${idx}">Day ${idx + 1} Complete!</div>
    <div class="score-msg" id="score-msg-${idx}"></div>
    <div class="day-nav">`;

  if (idx > 0) html += `<button class="btn btn-secondary" onclick="showDay(${idx - 1})">← Previous Day</button>`;
  if (idx < DAYS.length - 1) html += `<button class="btn btn-primary" onclick="showDay(${idx + 1})">Next Day →</button>`;
  else html += `<button class="btn btn-primary" onclick="showDay(0)">Back to Day 1</button>`;

  html += `</div></div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════

function selectMC(key, optionIdx, total) {
  for (let i = 0; i < total; i++) {
    const el = document.getElementById(`mc-${key}-${i}`);
    if (el) el.classList.remove('selected');
  }
  const el = document.getElementById(`mc-${key}-${optionIdx}`);
  if (el) el.classList.add('selected');
  selectedMC[key] = optionIdx;
}

function checkBlanks(exId, dayIdx, exIdx) {
  const ex = DAYS[dayIdx].exercises[exIdx];
  let correct = 0;
  ex.blanks.forEach((b, bi) => {
    const inputId = `blank-${exId}-${bi}`;
    const input = document.getElementById(inputId);
    const fb = document.getElementById(`fb-${inputId}`);
    const userVal = input.value.trim().toLowerCase().replace(/[άα]/g, 'α').replace(/[έε]/g, 'ε').replace(/[ήιίη]/g, 'η').replace(/[όο]/g, 'ο').replace(/[ύυ]/g, 'υ').replace(/[ώω]/g, 'ω');
    const answerNorm = b.answer.toLowerCase().replace(/[άα]/g, 'α').replace(/[έε]/g, 'ε').replace(/[ήιίη]/g, 'η').replace(/[όο]/g, 'ο').replace(/[ύυ]/g, 'υ').replace(/[ώω]/g, 'ω');
    if (userVal === answerNorm) {
      correct++;
      input.classList.add('correct');
      input.classList.remove('incorrect');
      fb.textContent = `✓ ${b.translation}`;
      fb.className = 'feedback success visible';
    } else {
      input.classList.add('incorrect');
      input.classList.remove('correct');
      fb.innerHTML = `✗ The answer is <strong>${b.answer}</strong> — ${b.translation}`;
      fb.className = 'feedback error visible';
    }
  });
  recordScore(exId, correct, ex.blanks.length);
  markComplete(exId);
  maybeShowSummary(dayIdx);
}

function revealBlanks(exId, dayIdx, exIdx) {
  const ex = DAYS[dayIdx].exercises[exIdx];
  ex.blanks.forEach((b, bi) => {
    const inputId = `blank-${exId}-${bi}`;
    const input = document.getElementById(inputId);
    const fb = document.getElementById(`fb-${inputId}`);
    input.value = b.answer;
    input.classList.add('correct');
    fb.innerHTML = `Answer: <strong>${b.answer}</strong> — ${b.translation}`;
    fb.className = 'feedback info visible';
  });
  markComplete(exId);
}

function checkMCQs(exId, dayIdx, exIdx) {
  const ex = DAYS[dayIdx].exercises[exIdx];
  let correct = 0;
  ex.mcqs.forEach((q, qi) => {
    const key = `${exId}-mcq-${qi}`;
    const chosen = selectedMC[key];
    const fb = document.getElementById(`fb-mcq-${key}`);
    for (let i = 0; i < q.options.length; i++) {
      const el = document.getElementById(`mc-${key}-${i}`);
      if (el) el.classList.add('disabled');
    }
    if (chosen === undefined) {
      if (fb) { fb.textContent = `No answer selected. Correct answer: ${q.options[q.correct]}`; fb.className = 'feedback error visible'; }
      return;
    }
    const chosenEl = document.getElementById(`mc-${key}-${chosen}`);
    const correctEl = document.getElementById(`mc-${key}-${q.correct}`);
    if (chosen === q.correct) {
      correct++;
      if (chosenEl) chosenEl.classList.add('correct');
      if (fb) { fb.textContent = '✓ Correct!'; fb.className = 'feedback success visible'; }
    } else {
      if (chosenEl) chosenEl.classList.add('incorrect');
      if (correctEl) correctEl.classList.add('correct');
      if (fb) { fb.textContent = `✗ Correct answer: ${q.options[q.correct]}`; fb.className = 'feedback error visible'; }
    }
  });
  recordScore(exId, correct, ex.mcqs.length);
  markComplete(exId);
  maybeShowSummary(dayIdx);
}

function checkStandaloneQ(exId, dayIdx, exIdx) {
  const ex = DAYS[dayIdx].exercises[exIdx];
  let correct = 0;
  ex.standaloneQ.forEach((q, qi) => {
    const key = `${exId}-sq-${qi}`;
    const chosen = selectedMC[key];
    const fb = document.getElementById(`fb-mcq-${key}`);
    for (let i = 0; i < q.options.length; i++) {
      const el = document.getElementById(`mc-${key}-${i}`);
      if (el) el.classList.add('disabled');
    }
    if (chosen === undefined) {
      if (fb) { fb.innerHTML = `No answer selected. Correct: <strong>${q.options[q.correct]}</strong><br><em>${q.explanation}</em>`; fb.className = 'feedback error visible'; }
      return;
    }
    const chosenEl = document.getElementById(`mc-${key}-${chosen}`);
    const correctEl = document.getElementById(`mc-${key}-${q.correct}`);
    if (chosen === q.correct) {
      correct++;
      if (chosenEl) chosenEl.classList.add('correct');
      if (fb) { fb.innerHTML = `✓ Correct! <em>${q.explanation}</em>`; fb.className = 'feedback success visible'; }
    } else {
      if (chosenEl) chosenEl.classList.add('incorrect');
      if (correctEl) correctEl.classList.add('correct');
      if (fb) { fb.innerHTML = `✗ Correct: <strong>${q.options[q.correct]}</strong><br><em>${q.explanation}</em>`; fb.className = 'feedback error visible'; }
    }
  });
  recordScore(exId, correct, ex.standaloneQ.length);
  markComplete(exId);
  maybeShowSummary(dayIdx);
}

function revealModelAnswer(exId) {
  const el = document.getElementById(`model-${exId}`);
  if (el) el.style.display = 'block';
  markComplete(exId);
}

// ═══════════════════════════════════════════════════════════
// SCORE & PROGRESS
// ═══════════════════════════════════════════════════════════

function recordScore(exId, correct, total) {
  scores[exId] = { correct, total };
  saveState();
}

function markComplete(exId) {
  completedExercises.add(exId);
  const card = document.getElementById(`card-${exId}`);
  if (card) card.classList.add('completed');
  saveState();
  updateProgress();
}

function updateProgress() {
  const totalEx = DAYS.reduce((sum, d) => sum + d.exercises.filter(e => e.blanks || e.mcqs || e.standaloneQ || e.freewrite).length, 0);
  const done = completedExercises.size;
  const pct = Math.round((done / totalEx) * 100);
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-pct');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
}

function maybeShowSummary(dayIdx) {
  const day = DAYS[dayIdx];
  const exercisable = day.exercises.filter(e => e.blanks || e.mcqs || e.standaloneQ || e.freewrite);
  const allDone = exercisable.every(e => completedExercises.has(e.id));
  if (!allDone) return;

  let totalCorrect = 0, totalPossible = 0;
  exercisable.forEach(e => {
    if (scores[e.id]) {
      totalCorrect += scores[e.id].correct;
      totalPossible += scores[e.id].total;
    }
  });

  const pct = totalPossible > 0 ? Math.round((totalCorrect / totalPossible) * 100) : null;
  const summary = document.getElementById(`day-summary-${dayIdx}`);
  if (!summary) return;
  summary.classList.add('visible');

  const scoreNum = document.getElementById(`score-num-${dayIdx}`);
  const scoreMsg = document.getElementById(`score-msg-${dayIdx}`);
  const circle = document.getElementById(`score-circle-${dayIdx}`);

  if (pct !== null) {
    if (scoreNum) scoreNum.textContent = pct + '%';
    if (circle) circle.style.background = `conic-gradient(var(--accent) ${pct}%, var(--surface3) ${pct}%)`;
    let msg = '';
    if (pct >= 90) msg = 'Εξαιρετικά! Outstanding work. You\'ve really got this.';
    else if (pct >= 70) msg = 'Πολύ καλά! Solid session. Review any errors and move on.';
    else if (pct >= 50) msg = 'Καλά! Good effort. Go back and look at where you lost marks — the patterns will start clicking.';
    else msg = 'Keep going! Greek grammar takes time. Re-read the theory and try the exercises again.';
    if (scoreMsg) scoreMsg.textContent = msg;
  } else {
    if (scoreNum) scoreNum.textContent = '✓';
    if (scoreMsg) scoreMsg.textContent = 'Day complete! Great work on the writing exercises.';
  }

  summary.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // Mark day button
  const btn = document.getElementById(`daybtn-${dayIdx}`);
  if (btn) btn.querySelector('.day-num').style.background = 'var(--success)';
}

function resetProgress() {
  if (!confirm('Reset all progress and start from Day 1?')) return;
  localStorage.removeItem(STORAGE_KEY);
  currentDay = 0;
  scores = {};
  completedExercises = new Set();
  selectedMC = {};
  document.querySelectorAll('.day-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
    const num = b.querySelector('.day-num');
    if (num) num.style.background = '';
  });
  renderDay(0);
  updateProgress();
}

function restoreState(dayIdx) {
  // Re-mark completed exercises visually
  const day = DAYS[dayIdx];
  day.exercises.forEach(ex => {
    if (completedExercises.has(ex.id)) {
      const card = document.getElementById(`card-${ex.id}`);
      if (card) card.classList.add('completed');
    }
  });
}
</script>
